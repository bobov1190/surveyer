{% extends "base.html" %}
{% block title %}Спасибо!{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4" style="background: radial-gradient(ellipse at 30% 40%, rgba(124,58,237,0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 70%, rgba(139,92,246,0.07) 0%, transparent 45%), #f9fafb;">
  <div class="w-full max-w-sm">

    <div class="p-10 rounded-2xl shadow-2xl flex flex-col items-center text-center text-white relative overflow-hidden animate-in" style="background: linear-gradient(135deg, #6d28d9 0%, #7c3aed 45%, #8b5cf6 100%);">
      <!-- Декоративные круги -->
      <div class="absolute w-48 h-48 bg-white opacity-[0.04] rounded-full -top-12 -right-12 pointer-events-none"></div>
      <div class="absolute w-32 h-32 bg-white opacity-[0.05] rounded-full -bottom-8 -left-8 pointer-events-none"></div>
      <div class="absolute w-16 h-16 bg-white opacity-[0.07] rounded-full top-1/2 right-8 pointer-events-none"></div>

      <!-- Иконка галочки с анимацией -->
      <div class="relative z-10 w-24 h-24 bg-white rounded-full flex items-center justify-center mb-8 shadow-lg">
        <svg class="w-12 h-12 text-violet-600" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="3">
          <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"
                style="stroke-dasharray: 26; stroke-dashoffset: 26; animation: draw-check 0.5s ease-out 0.35s forwards;"/>
        </svg>
      </div>

      <h1 class="relative z-10 text-2xl font-extrabold leading-tight mb-3 max-w-xs">
        Спасибо за прохождение опроса!
      </h1>
      <p class="relative z-10 text-violet-200 text-sm leading-relaxed mb-8">
        Ваши ответы на «{{ survey.title }}» сохранены.<br>Мы ценим ваше время!
      </p>

      <a href="/s/{{ survey.slug }}"
         class="relative z-10 w-full bg-white text-violet-700 font-bold py-3 px-6 rounded-xl
                hover:bg-violet-50 active:bg-violet-100 transition text-sm shadow-md text-center block">
        Пройти опрос ещё раз
      </a>
    </div>

  </div>
</div>

<style>
  @keyframes draw-check {
    to { stroke-dashoffset: 0; }
  }
</style>
<script>
  window.addEventListener('load', function () {
    setTimeout(function () { window.fireConfetti && window.fireConfetti(); }, 200);
  });
</script>
{% endblock %}
