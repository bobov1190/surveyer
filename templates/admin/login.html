{% extends "base.html" %}
{% block title %}Вход в админ-панель{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4" style="background: radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.07) 0%, transparent 55%), radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.05) 0%, transparent 45%), #f9fafb;">
  <div class="w-full max-w-sm">

    <!-- Логотип / заголовок -->
    <div class="text-center mb-8 animate-in">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-violet-100 rounded-2xl mb-4">
        <svg class="w-6 h-6 text-violet-600" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900">Админ-панель</h1>
      <p class="text-sm text-gray-500 mt-1">Войдите, чтобы управлять опросами</p>
    </div>

    <!-- Карточка -->
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 animate-in">

      {% if error %}
      <div class="bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl px-4 py-3 mb-6 flex items-center gap-2">
        <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
          <path fill-rule="evenodd" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-5" id="login-form">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Логин</label>
          <input type="text" name="username" required autocomplete="username" autofocus
                 class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent
                        transition placeholder-gray-300"
                 placeholder="admin" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Пароль</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm
                        focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent
                        transition placeholder-gray-300"
                 placeholder="••••••••" />
        </div>
        <button type="submit"
                class="w-full bg-violet-600 hover:bg-violet-700 active:bg-violet-800
                       text-white font-semibold py-2.5 rounded-xl transition text-sm mt-1">
          Войти
        </button>
      </form>

    </div>

    <p class="text-center text-xs text-gray-400 mt-5">
      <a href="/" class="hover:text-gray-600 transition">← На главную</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('login-form').addEventListener('submit', function () {
    showLoading(this.querySelector('[type="submit"]'), 'Входим…');
  });
</script>
{% endblock %}
